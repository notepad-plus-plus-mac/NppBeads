<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Beads — Board</title>
  <link rel="stylesheet" href="app.css">
</head>
<body>
  <div id="board-hdr" class="board-hdr">
    <div class="mode-toggle" role="tablist" aria-label="Status mode">
      <button class="mode-btn" data-mode="raw"       type="button" role="tab"
              title="Status as stored in bd — what you manually set"
              aria-selected="true">Raw</button>
      <button class="mode-btn" data-mode="effective" type="button" role="tab"
              title="Promotes open/in-progress issues with open blocker deps to the Blocked column"
              aria-selected="false">Effective</button>
    </div>
    <button id="new-issue-btn" class="new-issue-btn" type="button"
            title="Create a new issue (bd create)">+ New issue</button>
  </div>
  <template id="new-issue-tpl">
    <div class="modal-overlay" id="new-issue-overlay">
      <div class="modal-card new-issue-modal" role="dialog" aria-label="New issue">
        <div class="modal-hdr">
          <span class="modal-title">New issue</span>
          <button class="modal-close" type="button" aria-label="Close">×</button>
        </div>
        <form class="new-issue-form" novalidate>
          <label class="field">
            <span class="field-label">Title <span class="req">*</span></span>
            <input type="text" name="title" required autocomplete="off"
                   placeholder="Short summary of the issue">
          </label>
          <div class="field-row">
            <label class="field">
              <span class="field-label">Type</span>
              <select name="issueType">
                <option value="task">task</option>
                <option value="bug">bug</option>
                <option value="feature">feature</option>
                <option value="epic">epic</option>
                <option value="chore">chore</option>
                <option value="decision">decision</option>
              </select>
            </label>
            <label class="field">
              <span class="field-label">Priority</span>
              <select name="priority">
                <option value="0">P0 — critical</option>
                <option value="1">P1 — high</option>
                <option value="2" selected>P2 — normal</option>
                <option value="3">P3 — low</option>
                <option value="4">P4 — trivial</option>
              </select>
            </label>
          </div>
          <label class="field">
            <span class="field-label">Labels <span class="hint">(comma-separated)</span></span>
            <input type="text" name="labels" autocomplete="off" placeholder="backend, api">
          </label>
          <label class="field">
            <span class="field-label">Description <span class="hint">(Markdown)</span></span>
            <textarea name="description" rows="5"
                      placeholder="Context, acceptance criteria, etc."></textarea>
          </label>
          <div class="modal-actions">
            <span class="form-status"></span>
            <button type="button" class="btn btn-secondary new-issue-cancel">Cancel</button>
            <button type="submit" class="btn btn-primary new-issue-submit">Create</button>
          </div>
        </form>
      </div>
    </div>
  </template>
  <div id="board-scroll" class="board-scroll">
    <div id="board" class="board"></div>
  </div>
  <template id="card-tpl">
    <div class="card" draggable="true">
      <div class="card-hdr">
        <span class="card-type"></span>
        <a class="card-id" href="#"></a>
      </div>
      <div class="card-title"></div>
      <div class="card-meta"></div>
    </div>
  </template>
  <template id="col-tpl">
    <div class="col">
      <div class="col-hdr">
        <svg class="col-caret" width="10" height="10" viewBox="0 0 10 10">
          <path d="M2 3 L5 7 L8 3" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="col-title"></span>
        <span class="col-count"></span>
      </div>
      <div class="col-body"></div>
    </div>
  </template>
  <script src="../bridge.js"></script>
  <script src="app.js"></script>
  <script src="board.js"></script>
</body>
</html>
